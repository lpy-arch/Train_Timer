<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Trainer Hub - 训练追踪</title>
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body, #root { height: 100%; height: 100dvh; width: 100%; overflow: hidden; background: #0f0f1a; color: #fff; }
        body { padding-top: env(safe-area-inset-top); font-family: -apple-system, system-ui, sans-serif; }
        #root:empty::before { content: '正在初始化系统...'; display: flex; align-items: center; justify-content: center; height: 100vh; color: rgba(255,255,255,0.3); font-size: 14px; }
        .tab-btn { flex: 1; padding: 15px; background: none; border: none; font-size: 14px; cursor: pointer; transition: 0.3s; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const STORAGE_KEY = "tt_v3_cache";

// 解析逻辑：适配 5x5, 8/8/7, 55554 等多种记录习惯
function parseTrainingRecords(text) {
    if (!text) return [];
    const sessions = [];
    let currentSession = null;
    const lines = text.split("\n");

    for (let line of lines) {
        line = line.trim();
        if (!line || line.startsWith("//")) continue;
        
        const dateMatch = line.match(/^###\s*(\d{2}\/\d{2}\/\d{2})/);
        if (dateMatch) {
            if (currentSession) sessions.push(currentSession);
            currentSession = { date: dateMatch[1], exercises: [] };
            continue;
        }
        
        if (currentSession) {
            const exMatch = line.match(/^([^：:]+)[：:](.*)$/);
            if (exMatch) {
                const name = exMatch[1].trim();
                const rawData = exMatch[2].trim();
                const [weight, repPart] = rawData.split("*");
                let reps = [];
                
                if (repPart) {
                    if (repPart.includes("x")) {
                        const [r, s] = repPart.split("x").map(v => parseInt(v) || 0);
                        reps = Array(s).fill(r);
                    } else if (repPart.includes("/")) {
                        reps = repPart.split("/").map(v => parseInt(v) || 0);
                    } else {
                        // 处理类似 55544 的连续数字格式
                        reps = repPart.split("").map(v => parseInt(v) || 0);
                    }
                }
                currentSession.exercises.push({ name, weight: weight || "0", reps });
            }
        }
    }
    if (currentSession) sessions.push(currentSession);
    return sessions;
}

function App() {
    const [activeTab, setActiveTab] = useState("RECORDS");
    const [rawText, setRawText] = useState("");
    const [loading, setLoading] = useState(true);

    useEffect(() => {
        const cached = localStorage.getItem(STORAGE_KEY);
        // GitHub Pages 或本地服务器环境：自动尝试加载同目录 md
        fetch('./训练记录.md')
            .then(res => res.ok ? res.text() : Promise.reject())
            .then(data => {
                setRawText(data);
                localStorage.setItem(STORAGE_KEY, data);
                setLoading(false);
            })
            .catch(() => {
                // 本地 file:// 打开或加载失败时使用缓存
                if (cached) setRawText(cached);
                setLoading(false);
            });
    }, []);

    const sessions = useMemo(() => 
        parseTrainingRecords(rawText).sort((a, b) => b.date.localeCompare(a.date)), 
    [rawText]);

    if (loading) return null;

    return (
        <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
            <div style={{ padding: "16px", borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
                <h2 style={{ fontSize: "18px", fontWeight: "800", color: "#4ECDC4" }}>Trainer Hub</h2>
            </div>
            
            <div style={{ flex: 1, overflowY: "auto", padding: "16px 16px 40px" }}>
                {activeTab === "RECORDS" && (
                    sessions.length > 0 ? (
                        sessions.map((s, i) => (
                            <div key={i} style={{ marginBottom: "16px", background: "rgba(255,255,255,0.03)", padding: "12px", borderRadius: "12px", border: "1px solid rgba(255,255,255,0.05)" }}>
                                <div style={{ color: "#4ECDC4", marginBottom: "8px", fontWeight: "bold", fontSize: "14px" }}>{s.date}</div>
                                {s.exercises.map((ex, j) => (
                                    <div key={j} style={{ fontSize: "14px", color: "#ddd", marginBottom: "4px" }}>
                                        <span style={{ fontWeight: "600" }}>{ex.name}</span>：
                                        <span style={{ color: "#fff" }}>{ex.weight}kg</span> * {ex.reps.join("/")}
                                    </div>
                                ))}
                            </div>
                        ))
                    ) : (
                        <div style={{ textAlign: "center", marginTop: "40px", color: "#666" }}>暂无数据，请在 EDIT 页面粘贴记录</div>
                    )
                )}
                
                {activeTab === "EDIT" && (
                    <div style={{ height: "100%", display: "flex", flexDirection: "column" }}>
                        <textarea 
                            value={rawText} 
                            onChange={(e) => { 
                                setRawText(e.target.value); 
                                localStorage.setItem(STORAGE_KEY, e.target.value); 
                            }}
                            style={{ 
                                flex: 1, width: "100%", background: "#000", color: "#4ECDC4", 
                                border: "1px solid #333", borderRadius: "8px", padding: "12px", 
                                fontFamily: "monospace", fontSize: "13px", resize: "none" 
                            }}
                            placeholder="请按照 ### 26/04/07 格式输入..."
                        />
                    </div>
                )}
            </div>

            <div style={{ display: "flex", background: "#161625", borderTop: "1px solid #222", paddingBottom: "env(safe-area-inset-bottom)" }}>
                {["RECORDS", "EDIT"].map(tab => (
                    <button 
                        key={tab} 
                        onClick={() => setActiveTab(tab)} 
                        className="tab-btn" 
                        style={{ color: activeTab===tab?"#4ECDC4":"#666", fontWeight: activeTab===tab?"bold":"normal" }}
                    >
                        {tab === "RECORDS" ? "训练记录" : "编辑数据"}
                    </button>
                ))}
            </div>
        </div>
    );
}

// 适配 React 18 的渲染入口
const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App />);
</script>
</body>
</html>
