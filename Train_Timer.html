<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Trainer Hub - 训练追踪</title>
    <script src="https://esm.sh/react@18.2.0"></script>
    <script src="https://esm.sh/react-dom@18.2.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body, #root { height: 100%; height: 100dvh; width: 100%; overflow: hidden; background: #0f0f1a; color: #fff; }
        body { padding-top: env(safe-area-inset-top); font-family: -apple-system, system-ui, sans-serif; }
        #root:empty::before { content: '系统启动中...'; display: flex; align-items: center; justify-content: center; height: 100vh; color: rgba(255,255,255,0.3); }
        .tab-btn { flex: 1; padding: 15px; background: none; border: none; font-size: 14px; cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body>
    <div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const STORAGE_KEY = "tt_v3_cache";

// 解析逻辑保持高效
function parseTrainingRecords(text) {
    if (!text) return [];
    const sessions = [];
    let currentSession = null;
    const lines = text.split("\n");

    for (let line of lines) {
        line = line.trim();
        if (!line) continue;
        const dateMatch = line.match(/^###\s*(\d{2}\/\d{2}\/\d{2})/);
        if (dateMatch) {
            if (currentSession) sessions.push(currentSession);
            currentSession = { date: dateMatch[1], exercises: [] };
            continue;
        }
        if (currentSession) {
            const exMatch = line.match(/^([^：:]+)[：:](.*)$/);
            if (exMatch) {
                const name = exMatch[1].trim();
                const rawData = exMatch[2].trim();
                const parts = rawData.split("*");
                const weight = parts[0] || "0";
                const repStr = parts[1] || "";
                let reps = repStr.includes("x") ? Array(parseInt(repStr.split("x")[1]) || 0).fill(repStr.split("x")[0]) : repStr.split(/[\/\s]/);
                currentSession.exercises.push({ name, weight, reps });
            }
        }
    }
    if (currentSession) sessions.push(currentSession);
    return sessions;
}

function App() {
    const [activeTab, setActiveTab] = useState("RECORDS");
    const [rawText, setRawText] = useState("");
    const [loading, setLoading] = useState(true);

    // 自动加载逻辑：优先缓存，其次尝试读取同目录的 .md 文件
    useEffect(() => {
        const cached = localStorage.getItem(STORAGE_KEY);
        if (cached) {
            setRawText(cached);
            setLoading(false);
        } else {
            // 如果没缓存，尝试从服务器/本地拉取 .md
            fetch('./训练记录.md')
                .then(res => res.text())
                .then(data => {
                    if (data.includes('###')) {
                        setRawText(data);
                        localStorage.setItem(STORAGE_KEY, data);
                    }
                })
                .catch(() => console.log("本地模式：请手动粘贴数据"))
                .finally(() => setLoading(false));
        }
    }, []);

    const sessions = useMemo(() => parseTrainingRecords(rawText).sort((a, b) => b.date.localeCompare(a.date)), [rawText]);

    if (loading) return null;

    return (
        <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
            <div style={{ padding: "16px", borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
                <h2 style={{ fontSize: "18px", fontWeight: "800" }}>Trainer Hub</h2>
            </div>
            
            <div style={{ flex: 1, overflowY: "auto", padding: "16px" }}>
                {activeTab === "RECORDS" && (
                    sessions.map((s, i) => (
                        <div key={i} style={{ marginBottom: "16px", background: "rgba(255,255,255,0.03)", padding: "12px", borderRadius: "12px" }}>
                            <div style={{ color: "#4ECDC4", marginBottom: "8px", fontWeight: "bold" }}>{s.date}</div>
                            {s.exercises.map((ex, j) => (
                                <div key={j} style={{ fontSize: "14px", opacity: 0.8, marginBottom: "4px" }}>
                                    {ex.name}：{ex.weight}kg * {Array.isArray(ex.reps) ? ex.reps.join("/") : ex.reps}
                                </div>
                            ))}
                        </div>
                    ))
                )}
                
                {activeTab === "EDIT" && (
                    <textarea 
                        value={rawText} 
                        onChange={(e) => { setRawText(e.target.value); localStorage.setItem(STORAGE_KEY, e.target.value); }}
                        style={{ width: "100%", height: "80%", background: "#000", color: "#4ECDC4", border: "1px solid #333", borderRadius: "8px", padding: "10px", fontFamily: "monospace" }}
                        placeholder="在此粘贴 Markdown 记录..."
                    />
                )}
            </div>

            <div style={{ display: "flex", borderTop: "1px solid #222", paddingBottom: "env(safe-area-inset-bottom)" }}>
                {["RECORDS", "EDIT"].map(tab => (
                    <button key={tab} onClick={() => setActiveTab(tab)} className="tab-btn" style={{ color: activeTab===tab?"#4ECDC4":"#666" }}>
                        {tab === "RECORDS" ? "查看记录" : "编辑源码"}
                    </button>
                ))}
            </div>
        </div>
    );
}

// React 18 正确的渲染方式
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
